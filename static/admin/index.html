<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitcoinZ Admin CMS</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    .login-button {
      width: 100%;
      margin: 10px 0;
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .login-button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>BitcoinZ Admin CMS</h2>
    <button class="login-button" onclick="netlifyIdentity.open()">Login</button>
  </div>

  <script>
    // Netlify Identity Widget Configuration
    netlifyIdentity.on('login', user => {
      netlifyIdentity.close();
      window.location.href = '/admin/cms.html';
    });

    netlifyIdentity.on('logout', () => {
      netlifyIdentity.close();
    });
  </script>
</body>
</html>
