<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    body { margin: 0; padding: 0; }
    #nc-root { height: 100vh; }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  
  <!-- Load Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@2.10.192/dist/netlify-cms.js"></script>
  
  <script>
    // Initialize CMS
    window.addEventListener('load', function() {
      // Check for OAuth code in session storage
      const code = sessionStorage.getItem('github-oauth-code');
      if (code) {
        console.log('Found OAuth code, attempting to exchange for token');
        sessionStorage.removeItem('github-oauth-code');
      }

      // Initialize CMS
      window.CMS.init();

      // Log initialization
      console.log('CMS initialized');
    });

    // Log any errors
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('Error:', {
        message: msg,
        url: url,
        line: lineNo,
        column: columnNo,
        error: error
      });
    };
  </script>
</body>
</html>
