<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>BitcoinZ Content Manager</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .error-message {
      color: #dc3545;
      padding: 15px;
      margin: 15px;
      border: 1px solid #dc3545;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="error-message" class="error-message"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Enable debug mode
    window.CMS_DEBUG = true;

    // Error handling
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      console.error('[CMS Error]', message);
    }

    // Initialize CMS
    try {
      window.CMS.init();
      console.log('[CMS] Initialized successfully');
    } catch (error) {
      showError(`Failed to initialize CMS: ${error.message}`);
      console.error('[CMS Error]', error);
    }

    // Register event listeners
    window.CMS.registerEventListener({
      name: 'auth',
      handler: function(event) {
        console.log('[CMS Auth]', event);
        if (event.error) {
          showError(`Authentication error: ${event.error}`);
        }
      }
    });

    window.CMS.registerEventListener({
      name: 'error',
      handler: function(error) {
        showError(error.message || 'An error occurred');
        console.error('[CMS Error]', error);
      }
    });
  </script>
</body>
</html>
