<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAvkAmFSvGx57gCMuXoZ_9ZZT3DUV69ya4",
      authDomain: "bitcoinz-home-page.firebaseapp.com",
      projectId: "bitcoinz-home-page",
      storageBucket: "bitcoinz-home-page.firebasestorage.app",
      messagingSenderId: "78841991032",
      appId: "1:78841991032:web:8b06fd51c835389206028d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Custom auth handler
    const authHandler = {
      login: () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        return firebase.auth().signInWithPopup(provider);
      },
      logout: () => firebase.auth().signOut(),
      isLoggedIn: () => {
        const user = firebase.auth().currentUser;
        return !!user;
      }
    };

    // Register auth handler with CMS
    CMS.registerBackend('firebase', authHandler);

    // Initialize CMS
    CMS.init();

    // Handle initial auth state
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        authHandler.login();
      }
    });
  </script>
</body>
</html>
