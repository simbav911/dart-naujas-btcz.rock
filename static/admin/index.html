<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .login-button {
      background: #4285f4;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    .login-button:hover {
      background: #357abd;
    }
    #nc-root {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container" id="login">
    <button class="login-button" onclick="handleLogin()">Sign in with Google</button>
  </div>

  <div id="nc-root"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.1.0-beta.1/dist/decap-cms.js"></script>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAvkAmFSvGx57gCMuXoZ_9ZZT3DUV69ya4",
      authDomain: "bitcoinz-home-page.firebaseapp.com",
      projectId: "bitcoinz-home-page",
      storageBucket: "bitcoinz-home-page.firebasestorage.app",
      messagingSenderId: "78841991032",
      appId: "1:78841991032:web:8b06fd51c835389206028d"
    };

    firebase.initializeApp(firebaseConfig);

    function handleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then((result) => {
          console.log('Logged in as:', result.user.email);
          showCMS();
        })
        .catch((error) => {
          console.error('Login error:', error);
          alert('Login failed: ' + error.message);
        });
    }

    function showCMS() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('nc-root').style.display = 'block';
      // Initialize CMS after successful login
      CMS.init();
    }

    // Check if user is already logged in
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        console.log('User is already signed in:', user.email);
        showCMS();
      }
    });
  </script>
</body>
</html>
