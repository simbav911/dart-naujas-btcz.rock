<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitcoinZ Admin CMS</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .login-button:hover {
      background: #357abd;
    }
    #nc-root {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container" id="login">
    <h2>BitcoinZ Admin CMS</h2>
    <button class="login-button" id="google-login">Sign in with Google</button>
  </div>

  <div id="nc-root"></div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.1.0-beta.1/dist/decap-cms.js"></script>

  <!-- Firebase Authentication Module -->
  <script type="module">
    import { handleLogin, initAuth } from './firebase-auth.js';

    // Attach login handler to button
    document.getElementById('google-login').addEventListener('click', handleLogin);

    // Initialize authentication state
    initAuth();
  </script>
</body>
</html>
