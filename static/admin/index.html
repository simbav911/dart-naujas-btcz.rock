<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
    }
    #login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: #f5f5f5;
    }
    .login-button {
      background: #4285f4;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    .login-button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div id="login">
    <button class="login-button" onclick="handleLogin()">Sign in with Google</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAvkAmFSvGx57gCMuXoZ_9ZZT3DUV69ya4",
      authDomain: "bitcoinz-home-page.firebaseapp.com",
      projectId: "bitcoinz-home-page",
      storageBucket: "bitcoinz-home-page.firebasestorage.app",
      messagingSenderId: "78841991032",
      appId: "1:78841991032:web:8b06fd51c835389206028d"
    };

    firebase.initializeApp(firebaseConfig);

    async function handleLogin() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebase.auth().signInWithPopup(provider);
        
        if (result.user) {
          document.getElementById('login').style.display = 'none';
          CMS.init();
        }
      } catch (error) {
        console.error('Login failed:', error);
        alert(error.message);
      }
    }

    // Check authentication state on load
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        document.getElementById('login').style.display = 'none';
        CMS.init();
      }
    });

    // Handle logout
    window.addEventListener('message', function(e) {
      if (e.data.type === 'logout') {
        firebase.auth().signOut().then(() => {
          document.getElementById('login').style.display = 'flex';
          location.reload();
        });
      }
    });
  </script>
</body>
</html>
