<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Authenticating...</title>
    <script>
        // Handle the OAuth callback
        (function() {
            function parseHash(hash) {
                return hash
                    .substring(1)
                    .split('&')
                    .reduce(function(result, item) {
                        var parts = item.split('=');
                        result[parts[0]] = decodeURIComponent(parts[1]);
                        return result;
                    }, {});
            }

            // Get the hash parameters
            var params = parseHash(window.location.hash);

            if (params.access_token) {
                console.log('Access token received, storing credentials');
                localStorage.setItem('netlify-cms-user', JSON.stringify({
                    token: params.access_token,
                    provider: 'github'
                }));
                
                // Redirect back to the admin page
                window.location.href = '/dart-naujas-btcz.rock/admin/';
            } else {
                console.error('No access token found in callback');
                window.location.href = '/dart-naujas-btcz.rock/admin/#error=access_denied';
            }
        })();
    </script>
</head>
<body>
    <h1>Authenticating...</h1>
    <p>You will be redirected back to the admin interface shortly.</p>
</body>
</html>
