<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Authenticating...</title>
    <script>
        // Handle the OAuth callback
        window.onload = function() {
            try {
                // Get the hash fragment
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                
                // Check if we have a token
                if (params.has('access_token')) {
                    console.log('Token received in callback');
                    // Redirect back to the admin page with the token
                    window.location.href = '/dart-naujas-btcz.rock/admin/#' + hash;
                } else {
                    console.error('No access token found in callback');
                    document.getElementById('message').textContent = 'Authentication failed. No access token received.';
                }
            } catch (error) {
                console.error('Error in callback:', error);
                document.getElementById('message').textContent = 'Authentication error: ' + error.message;
            }
        };
    </script>
</head>
<body>
    <h1>Authenticating...</h1>
    <p id="message">Please wait while we complete the authentication process...</p>
</body>
</html>
