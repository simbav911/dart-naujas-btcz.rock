backend:
  name: github
  repo: simbav911/dart-naujas-btcz.rock
  branch: main
  auth_type: implicit
  base_url: https://api.github.com
  app_id: Ov23liqF0ZzZ0yHojmSc

local_backend: true
publish_mode: editorial_workflow

media_folder: static/images
public_folder: /images

collections:
  - name: posts
    label: "Blog Posts"
    folder: content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Publish Date", name: date, widget: datetime}
      - {label: "Body", name: body, widget: markdown}

  - name: pages
    label: "English Pages"
    folder: content/en
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Body", name: body, widget: markdown}

  - name: roadmap_items
    label: "Roadmap Items"
    folder: content/roadmap
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Date", name: date, widget: datetime}
      - {label: "Body", name: body, widget: markdown}