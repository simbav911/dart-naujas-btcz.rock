backend:
  name: github
  repo: simbav911/dart-naujas-btcz.rock
  branch: main
  auth_type: implicit
  app_id: Ov23likVSo2M8nWaTKxA
  client_id: Ov23likVSo2M8nWaTKxA
  base_url: https://github.com
  auth_endpoint: login/oauth/authorize
  redirect_uri: https://simbav911.github.io/dart-naujas-btcz.rock/admin/oauth-proxy.html

# Media handling
media_folder: static/images
public_folder: /images

# Collections
collections:
  - name: posts
    label: "News Posts"
    folder: content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Publish Date", name: date, widget: datetime}
      - {label: "Featured Image", name: image, widget: image, required: false}
      - {label: "Body", name: body, widget: markdown}

  - name: pages
    label: "Pages"
    folder: content
    create: true
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Body", name: body, widget: markdown}

# Publishing settings
publish_mode: editorial_workflow

# Development settings
local_backend: false

# Site URL settings
site_url: https://simbav911.github.io/dart-naujas-btcz.rock
display_url: https://simbav911.github.io/dart-naujas-btcz.rock
