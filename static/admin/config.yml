backend:
  name: github
  repo: simbav911/dart-naujas-btcz.rock   # Replace with your "username/repo"
  branch: main
  base_url: https://github.com
  auth_endpoint: /login/oauth/authorize
  client_id: Ov23likVSo2M8nWaTKxA          # Replace with your actual client_id from GitHub OAuth App
  app_id: dart-naujas-btcz.rock

# Removes the local backend; rely on the GitHub OAuth flow
# local_backend: true   # <= Do not include in production

publish_mode: editorial_workflow

media_folder: "static/images"    # Folder in your repo where images are stored
public_folder: "/images"         # The public path to these images

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
