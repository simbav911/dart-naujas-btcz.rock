backend:
  name: github
  repo: simbav911/dart-naujas-btcz.rock
  branch: main
  auth_type: implicit
  client_id: Ov23likVSo2M8nWaTKxA
  auth_endpoint: oauth
  app_id: Ov23likVSo2M8nWaTKxA
  base_url: https://api.github.com
  auth_scope: repo,user

# Site URLs
site_url: https://simbav911.github.io/dart-naujas-btcz.rock
display_url: https://simbav911.github.io/dart-naujas-btcz.rock

# Media handling
media_folder: "static/images"
public_folder: "/images"

# Publishing settings
publish_mode: editorial_workflow
local_backend: false

# Collections
collections:
  - name: "posts"
    label: "News Posts"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

# Slug settings
slug:
  encoding: "ascii"
  clean_accents: true
