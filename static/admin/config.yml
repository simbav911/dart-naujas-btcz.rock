backend:
  name: github
  repo: simbav911/dart-naujas-btcz.rock
  branch: main
  base_url: https://api.github.com
  auth_endpoint: https://github.com/login/oauth/authorize
  token_endpoint: https://github.com/login/oauth/access_token
  client_id: Ov23likVSo2M8nWaTKxA
  auth_type: implicit
  redirect_uri: https://simbav911.github.io/dart-naujas-btcz.rock/admin/callback/

# Media handling
media_folder: static/images
public_folder: /images

# Collections
collections:
  - name: news
    label: News
    folder: content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: "Publish Date", name: date, widget: datetime}
      - {label: "Featured Image", name: image, widget: image, required: false}
      - {label: Body, name: body, widget: markdown}

# Display settings
display_url: https://simbav911.github.io/dart-naujas-btcz.rock
site_url: https://simbav911.github.io/dart-naujas-btcz.rock

# Development settings
local_backend: false

# Publishing settings
publish_mode: editorial_workflow

# Slug settings
slug:
  encoding: "ascii"
  clean_accents: true
