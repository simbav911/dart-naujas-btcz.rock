backend:
  name: test-repo

local_backend: true

media_folder: static/images
public_folder: /images

collections:
  - name: news
    label: News
    folder: content/news
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Body, name: body, widget: markdown }

  - name: roadmap
    label: Roadmap
    folder: content/roadmap
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Body, name: body, widget: markdown }
