backend:
  name: github
  repo: bitcoinz-site/homepage  # Replace with your GitHub repo
  branch: main  # or your default branch
  base_url: https://your-auth-server.com  # Replace with your auth server URL
  auth_endpoint: /auth  # Customize based on your auth setup

publish_mode: editorial_workflow

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "News"
    folder: "content/en/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "roadmap"
    label: "Roadmap"
    folder: "content/roadmap"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}

# Add more collections as needed