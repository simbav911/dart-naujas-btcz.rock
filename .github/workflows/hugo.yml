name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: List files before build
        run: |
          echo "Static directory contents:"
          ls -la static/images/news || echo "News images directory not found"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          HUGO_BASEURL: "https://simbav911.github.io/dart-naujas-btcz.rock/"
        run: |
          hugo \
            --minify \
            --baseURL "https://simbav911.github.io/dart-naujas-btcz.rock/" \
            --debug

      - name: List files after build
        run: |
          echo "Public directory contents:"
          ls -la public/images/news || echo "Built news images directory not found"
          echo "\nVerifying specific image exists:"
          find public/images/news -name "BTCZinChangelly-400x250.jpg" || echo "Test image not found"
          echo "\nVerifying image URLs in HTML:"
          grep -r "images/news" public/en/news/ || echo "No image references found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
